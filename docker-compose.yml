services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: rails_stack_demo_development
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  elasticsearch:
    image: elasticsearch:8.8.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  mailcatcher:
    image: schickling/mailcatcher
    ports:
      - "1080:1080"
      - "1025:1025"

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile
    ports:
      - "8000:3000"
    volumes:
      - .:/app
      - bundle_cache:/usr/local/bundle
    environment:
      - DATABASE_URL=postgresql://postgres:password@db:5432/rails_stack_demo_development
      - REDIS_URL=redis://redis:6379/0
      - ELASTICSEARCH_URL=http://elasticsearch:9200
      - RAILS_ENV=development
    depends_on:
      db:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    stdin_open: true
    tty: true
    command: /app/docker/entrypoint.sh

  test-runner:
    build:
      context: .
      dockerfile: docker/Dockerfile.test
    volumes:
      - .:/rails
      - test_bundle_cache:/rails/vendor/bundle
    environment:
      - DATABASE_URL=postgresql://postgres:password@db:5432/rails_stack_demo_test
      - REDIS_URL=redis://redis:6379/1
      - ELASTICSEARCH_URL=http://elasticsearch:9200
      - RAILS_ENV=test
      - CAPYBARA_SERVER_HOST=0.0.0.0
      - CAPYBARA_SERVER_PORT=3001
      - DISPLAY=:99
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    profiles:
      - test

volumes:
  postgres_data:
  redis_data:
  elasticsearch_data:
  bundle_cache:
  test_bundle_cache:
